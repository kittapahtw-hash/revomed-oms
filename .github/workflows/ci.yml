name: CI

on:
  push: { branches: [main] }
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
        env:
          # ค่าปลอมสำหรับ build — ไม่ได้ต่อ DB จริงตอน CI
          DATABASE_URL: postgresql://u:p@localhost:5432/db
          AUTH_SECRET: ci-secret-that-is-at-least-32-chars-long
